version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hewane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hewane
      POSTGRES_PASSWORD: hewane_dev_password
      POSTGRES_DB: hewane_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hewane -d hewane_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hewane-network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hewane-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://hewane:hewane_dev_password@postgres:5432/hewane_dashboard
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Hewane Admin}
      DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      N8N_VALIDATE_WEBHOOK_URL: ${N8N_VALIDATE_WEBHOOK_URL}
      N8N_WORKFLOW_A_URL: ${N8N_WORKFLOW_A_URL}
      N8N_WORKFLOW_B_URL: ${N8N_WORKFLOW_B_URL}
      N8N_BASE_URL: ${N8N_BASE_URL}
      N8N_API_KEY: ${N8N_API_KEY}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/sign-in"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    volumes:
      - ./sheets.config.json:/app/sheets.config.json:ro
    networks:
      - hewane-network

networks:
  hewane-network:
    driver: bridge

volumes:
  postgres-data:
